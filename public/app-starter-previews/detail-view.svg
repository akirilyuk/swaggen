<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Detail page layout preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="s" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Back link -->
  <rect x="14" y="12" width="52" height="6" rx="2" fill="#94a3b8" opacity="0.7"/>
  <!-- Title -->
  <rect x="14" y="26" width="200" height="12" rx="2" fill="#475569"/>
  <!-- Subtitle -->
  <rect x="14" y="44" width="160" height="5" rx="1.5" fill="#94a3b8" opacity="0.65"/>
  <!-- Main detail card -->
  <g filter="url(#s)">
    <rect x="14" y="58" width="188" height="88" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  </g>
  <rect x="24" y="68" width="72" height="5" rx="1.5" fill="#64748b"/>
  <rect x="24" y="80" width="168" height="4" rx="1" fill="#e2e8f0"/>
  <rect x="24" y="90" width="150" height="4" rx="1" fill="#e2e8f0"/>
  <rect x="24" y="100" width="168" height="4" rx="1" fill="#e2e8f0"/>
  <rect x="24" y="110" width="140" height="4" rx="1" fill="#e2e8f0"/>
  <rect x="24" y="124" width="76" height="14" rx="3" fill="#ede9fe" stroke="#a78bfa" stroke-width="0.75"/>
  <rect x="106" y="124" width="76" height="14" rx="3" fill="#fee2e2" stroke="#f87171" stroke-width="0.75"/>
  <!-- Related panel -->
  <g filter="url(#s)">
    <rect x="210" y="58" width="96" height="88" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  </g>
  <rect x="220" y="68" width="56" height="5" rx="1.5" fill="#64748b"/>
  <rect x="220" y="80" width="76" height="4" rx="1" fill="#e2e8f0"/>
  <rect x="220" y="90" width="76" height="4" rx="1" fill="#e2e8f0"/>
  <rect x="220" y="100" width="60" height="4" rx="1" fill="#e2e8f0"/>
  <!-- Response strip -->
  <g filter="url(#s)">
    <rect x="14" y="154" width="292" height="18" rx="4" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  </g>
  <rect x="22" y="160" width="88" height="4" rx="1" fill="#94a3b8" opacity="0.6"/>
</svg>
